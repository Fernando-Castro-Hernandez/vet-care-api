spring.application.name=vet-care-api
server.port=8090

# Importa el archivo local de secretos (optional: = no truena si no existe)
spring.config.import=optional:classpath:secrets.properties

# ---- PostgreSQL ----
spring.datasource.url=jdbc:postgresql://localhost:5432/vet_care
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
